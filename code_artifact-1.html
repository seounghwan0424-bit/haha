<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전공 선택 가이드 밸런스 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        .option-btn {
            transition: all 0.2s ease;
        }
        
        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .option-btn:active {
            transform: translateY(1px);
        }

        /* Loading Spinner */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 메인 컨테이너 -->
    <div id="app-container" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden relative min-h-[600px] flex flex-col">
        
        <!-- 1. 시작 화면 -->
        <div id="screen-start" class="flex flex-col items-center justify-center flex-1 p-8 text-center fade-in">
            <div class="w-24 h-24 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-4xl mb-6 shadow-sm">
                🩺
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-4 leading-snug">나의 영혼과<br>가장 잘 맞는 전공은?</h1>
            <p class="text-slate-500 mb-10 text-sm leading-relaxed">
                25개의 밸런스 게임을 통해<br>당신의 성향, 추천 직군,<br>그리고 딱 맞는 전공 Top 3를 찾아드립니다.
            </p>
            <button onclick="startGame()" class="w-full bg-blue-600 text-white font-semibold py-4 rounded-2xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">
                테스트 시작하기
            </button>
        </div>

        <!-- 2. 질문 화면 -->
        <div id="screen-question" class="hidden flex-col flex-1 p-6">
            <!-- 프로그레스 바 -->
            <div class="w-full bg-slate-100 rounded-full h-2 mb-8 mt-2">
                <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            
            <div class="flex-1 flex flex-col">
                <div class="mb-2 text-blue-500 font-bold text-sm tracking-wide" id="question-number">Q1.</div>
                <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 leading-relaxed break-keep">
                    질문 내용이 여기에 들어갑니다.
                </h2>
                
                <div class="mt-auto space-y-4 mb-4" id="options-container">
                    <!-- 버튼들이 동적으로 렌더링됨 -->
                </div>
            </div>
        </div>

        <!-- 3. 로딩 화면 -->
        <div id="screen-loading" class="hidden flex-col items-center justify-center flex-1 p-8 text-center">
            <div class="spinner mb-6"></div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">결과 분석 중...</h2>
            <p class="text-slate-500 text-sm">수만 가지 경우의 수를 계산하고 있어요!</p>
        </div>

        <!-- 4. 결과 화면 -->
        <div id="screen-result" class="hidden flex-col flex-1 p-6 overflow-y-auto">
            <div class="text-center mb-8 fade-in" style="animation-delay: 0.1s;">
                <p class="text-blue-500 font-bold text-sm mb-2">나의 의사 캐릭터</p>
                <h1 id="result-title" class="text-2xl font-extrabold text-slate-800 mb-4 break-keep">욕심쟁이 참의사</h1>
                <div class="bg-slate-50 p-5 rounded-2xl text-slate-600 text-sm leading-relaxed text-left" id="result-desc">
                    설명글...
                </div>
            </div>

            <div class="mb-8 fade-in" style="animation-delay: 0.3s;">
                <p class="text-slate-500 font-bold text-xs mb-3 ml-1">나의 찰떡 전공 TOP 3</p>
                <div class="space-y-3" id="recommendations">
                    <!-- 추천 전공 렌더링 -->
                </div>
            </div>

            <div class="mt-auto pt-4 fade-in" style="animation-delay: 0.5s;">
                <button onclick="restartGame()" class="w-full bg-slate-800 text-white font-semibold py-4 rounded-2xl hover:bg-slate-900 transition-colors">
                    다시 테스트하기
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- [데이터 영역] ---
        
        // 1. 메인 질문 (20개) + 가중치
        const mainQuestions = [
            { q: "복잡한 증상을 호소하는 환자가 왔다. 내가 더 쾌감을 느끼는 상황은?", opts: [
                { text: "흩어진 단서(lab, 문진)를 종합하여 아무도 몰랐던 진단명을 추론해냈을 때", score: {x: -5} },
                { text: "눈앞에 확실하게 보이는 병변을 내 손으로 제거나 꿰매어서 환자가 나아졌을 때", score: {x: 5} }
            ]},
            { q: "다음 중 나의 평소 성향과 잘 맞는 업무는?", opts: [
                { text: "약물 용량을 조절하고, 메커니즘을 고민하며 꼼꼼하게 최적의 치료 계획을 세우는 것이 좋다.", score: {x: -5} },
                { text: "고민하기보다는 행동 먼저! 정교한 손기술을 발휘해서 즉각적인 결과를 만들어내야 마음이 편하다!", score: {x: 5} }
            ]},
            { q: "평화로운 당직 시간, 갑자기 병동에서 CPR 코드가 울린다! 내 심박수와 기분은?", opts: [
                { text: "\"아... 제발 내 환자 아니어라...\" 예상치 못한 돌발 상황은 너무 스트레스야. 나는 계획대로 돌아가는 루틴한 진료가 좋아.", score: {y: -5} },
                { text: "\"비켜보세요, 제가 갑니다!\" 긴박한 상황에서 생명의 끈을 붙잡는 아드레날린 뿜뿜하는 순간이 의사의 낭만이지.", score: {y: 5} }
            ]},
            { q: "내가 더 선호하는 환자와의 관계(호흡)는?", opts: [
                { text: "한 환자를 길게 보면서, 만성 질환을 꾸준히 관리하고 함께 나이 들어가며 호전되는 걸 지켜보는 마라톤.", score: {y: -5} },
                { text: "당장 생사가 오가는 급성기 문제를 짧고 굵게, 드라마틱하게 살려내고 쿨하게 떠나보내는 단거리 스프린트.", score: {y: 5} }
            ]},
            { q: "나의 주된 업무 환경, 둘 중 하나만 선택해야 한다면?", opts: [
                { text: "환자의 기분을 맞춰주고 라포를 쌓는 게 너무 힘들어.. 환자랑 눈 안 마주치고 데이터랑 화면을 보는 게 마음이 편해.", score: {z: -5} },
                { text: "환자들로 북적이는 진료실이나 병동. 사람들과 눈을 맞추고, 직접 이야기를 듣고, 교감하면서 진료하는 게 내 적성에 맞아.", score: {z: 5} }
            ]},
            { q: "나에게 '좋은 진료'란 어떤 느낌에 더 가까울까?", opts: [
                { text: "감정이 배제된 객관적이고 명확한 수치, 사진, 팩트를 바탕으로 한 치의 오차도 없는 완벽한 결론을 도출해 내는 것.", score: {z: -5} },
                { text: "환자의 불안한 마음을 다독여주고, 따뜻한 말 한마디로 위로를 전하며 인간적인 신뢰를 끈끈하게 쌓아가는 것.", score: {z: 5} }
            ]},
            { q: "미래의 내 라이프 스타일, 가장 이상적인 퇴근 시간의 모습은?", opts: [
                { text: "\"집에 가서 뭐해, 병원이 내 집이지!\" 쏟아지는 업무와 잦은 당직 속에서 피곤하긴 해도, 병원을 지키고 있다는 성취감과 사명감에 취해 있는 나.", score: {w: -5} },
                { text: "\"6시 정각, 수고하셨습니다~\" 가운 벗는 순간 나는 완전한 자연인! 꾸준한 운동이나 개인적인 취미 생활, 저녁이 있는 삶은 절대 포기 못 해.", score: {w: 5} }
            ]},
            { q: "커리어와 보상에 대한 나의 가치관은?", opts: [
                { text: "빡세게 구르는 게 진짜지! 내 개인 시간과 체력을 갈아 넣더라도, 그만큼 묵직한 보상과 명예, 그리고 대체 불가능한 실력을 얻고 싶어.", score: {w: -5} },
                { text: "아무리 보상이 좋아도 내 몸과 멘탈이 상해가며 일하는 건 딱 질색이야. 적당한 로딩 속에서 웰빙과 경제적 안정을 길게 가져가는 장기전이 좋아.", score: {w: 5} }
            ]},
            { q: "응급실/외래 당직 중, 내가 더 흥미를 느끼며 진료하고 싶은 환자는?", opts: [
                { text: "피를 철철 흘리며 들어온 열상 환자. 바로 장갑 끼고 내 손으로 빠르고 깔끔하게 꿰매서 즉각적으로 피를 멎게 하고 보낼 때.", score: {x: 5, y: 5} },
                { text: "혈당과 혈압 조절이 잘 안 되는 만성질환 환자. 지난 3개월 치 Lab 결과와 생활 습관을 꼼꼼히 분석해서, 약물 용량을 절묘하게 맞춰주고 다음 달을 기약할 때.", score: {x: -5, y: -5} }
            ]},
            { q: "오늘 하루, 나에게 주어진 스케줄 중 그나마 덜 스트레스받을 것 같은 업무는?", opts: [
                { text: "생명에 지장은 없지만, 하루 종일 예약이 꽉 차 있는 반복적인 종양 제거 시술이나 내시경 스케줄. 손은 좀 아파도 변수 없이 깔끔하게 끝나는 일과.", score: {x: 4, y: -2} },
                { text: "혈압이 오르락내리락하는 중환자실 환자 1명 전담하기. 수술이나 시술을 직접 하진 않지만, 실시간 모니터 수치를 보며 수액과 승압제 용량을 머리 터지게 계산하고 조절해야 하는 두뇌 싸움.", score: {x: -3, y: 2} }
            ]},
            { q: "오후 6시, 나의 이상적인 퇴근 무렵 풍경은?", opts: [
                { text: "아직 퇴근하긴 이르지! 내 회진을 기다리는 병동 환자들에게 가서, 불안해하는 환자의 손을 잡아주고 상태를 친절하게 설명해 주는 중. 몸은 고되지만 날 믿어주는 눈빛에 피로가 녹는다.", score: {z: 4, w: -4} },
                { text: "6시 정각 칼퇴! 오늘은 회진만 끝내고 산더미 같은 영상 판독과 검사 결과 분석을 완벽하게 끝냈다. 이제 집에 가서 소분해 둔 재료로 맛있는 저녁을 해 먹고 내 취미 루틴을 즐기러 가야지.", score: {z: -4, w: 3} }
            ]},
            { q: "펠로우를 마치고 자리를 잡을 때, 내가 더 끌리는 근무 환경은?", opts: [
                { text: "동네에서 가볍게 사람들을 만나는 뷰티/클리닉 원장님. 가벼운 미소와 스몰토크로 환자들을 기분 좋게 해 주고, 저녁엔 일찍 문 닫고 사랑하는 사람과 여유로운 데이트나 취미를 즐기는 웰빙 라이프.", score: {z: 2, w: 4} },
                { text: "병원 지하에서 묵묵히 일하는 검사 파트의 핵심 에이스. 사람 대하는 감정 노동은 없지만, 남들이 놓친 희귀한 병변을 현미경이나 영상으로 찾아내느라 밤낮없이 일에 파묻혀 지내는 전문가의 삶.", score: {z: -3, w: -3} }
            ]},
            { q: "수술실이나 진료실에서 내가 더 선호하는 나의 모습은?", opts: [
                { text: "마취된 환자에게 빠르고 완벽하게 수술을 끝내고, 회진 때도 긴 말 할 필요 없이 결과 사진만 보여주며 쿨하게 \"수술 잘 됐습니다\" 하고 돌아서는 츤데레 해결사.", score: {x: 3, z: -3} },
                { text: "진료실에서 복잡한 검사 결과나 증상을 환자 눈높이에 맞춰 친절하게 설명해주고, 환자와 함께 고민하며 최적의 약물 조합을 꼼꼼하게 찾아가는 따뜻한 명탐정.", score: {x: -3, z: 3} }
            ]},
            { q: "병원에서 나의 에너지를 쓴다면, 어느 쪽에 더 투자할래?", opts: [
                { text: "하루 종일 서 있어야 하고 육체적으로 고되지만, 남들이 쉽게 못하는 고난이도 수술이나 시술을 해내며 병원에서 대체 불가능한 에이스로 인정받기. 땀 흘린 만큼 빛나는 명예!", score: {x: 3, w: -4} },
                { text: "육체적인 피로도는 최대한 줄이고, 쾌적한 진료실에 앉아 환자의 상태를 분석하고 깔끔하게 처방전 낸 뒤, 정시 퇴근해서 내 취미 생활 즐기러 가기. 머리는 쓰지만 몸은 편하게!", score: {x: -4, w: 3} }
            ]},
            { q: "병원 근무 중, 내가 더 몰입하기 좋은 상황은?", opts: [
                { text: "중환자실 모니터 알람이 미친 듯이 울리는 긴박한 상황. 환자와 감정적인 대화를 나눌 틈도 없이, 실시간으로 변하는 수치와 모니터만 보고 기계처럼 빠르고 정확하게 생체 징후를 잡아낼 때.", score: {y: 4, z: -4} },
                { text: "매달 외래에 약 타러 오시는 단골 환자들. 큰 이벤트는 없지만, 요즘 식사는 잘하시는지 안부도 묻고 손도 잡아드리며 인간적인 끈을 오랫동안 이어갈 때.", score: {y: -4, z: 4} }
            ]},
            { q: "나의 전공을 평생 해야 한다면, 둘 중 절대 포기할 수 없는 것은?", opts: [
                { text: "\"내 환자는 내가 살린다!\" 언제 터질지 모르는 응급콜에 늘 긴장하고 밤을 새워야 하더라도, 죽어가는 사람을 살려냈을 때의 그 벅찬 감동은 절대 포기 못해.", score: {y: 4, w: -4} },
                { text: "\"내 삶도 소중하다!\" 응급 상황 없이 예약된 환자만 정해진 시간에 딱딱 보고, 퇴근 후나 주말엔 병원 연락받을 일 없이 철저하게 내 개인 시간을 보장받는 평화로운 일상.", score: {y: -4, w: 4} }
            ]},
            { q: "나의 게임 플레이 스타일은?", opts: [
                { text: "대검 같은 무기를 들고 적의 패턴을 분석하기보단 내 손컨과 피지컬로 밀어붙이는 스타일. 아슬아슬하게 살아남을 때 아드레날린이 폭발한다. NPC와의 대화는 스킵.", score: {x: 4, y: 4, z: -4} },
                { text: "적의 속성과 약점을 꼼꼼히 계산해서 스킬 트리를 짜는 전략가. 안정적인 힐과 버프로 파티를 이끌며, NPC들과 깊은 대화를 나누고 세계관의 스토리를 즐기는 게 재미지.", score: {x: -3, y: -4, z: 4} }

            { name: "성형외과 (재건/화상 전문)", coords: [5, 3, 2, -4] },
            { name: "산과 (고위험산모/분만)", coords: [4, 5, 2, -5] },
            { name: "부인과 (종양/수술)", coords: [5, 3, 2, -3] },
            { name: "생식내분비 (난임 전문)", coords: [2, -4, 3, 3] },
            { name: "소아청소년과 (일반/로컬)", coords: [-3, -2, 5, 2] },
            { name: "소아청소년과 (NICU/PICU)", coords: [2, 5, -1, -5] },
            { name: "신경과 (뇌졸중/신경계중환자)", coords: [1, 5, -1, -4] },
            { name: "신경과 (치매/파킨슨/일반)", coords: [-4, -2, 4, 2] },
            { name: "안과 (백내장/시력교정)", coords: [5, -5, 2, 4] },
            { name: "안과 (망막 전문)", coords: [4, 2, 1, -2] },
            { name: "이비인후과", coords: [4, -2, 3, 2] },
            { name: "피부과 (전문의)", coords: [3, -5, 3, 5] },
            { name: "비뇨의학과", coords: [4, -1, 2, 3] },
            { name: "정신건강의학과", coords: [-5, -3, 5, 4] },
            { name: "재활의학과 (일반/통증/근골격계)", coords: [1, -4, 3, 4] },
            { name: "재활의학과 (소아재활)", coords: [-2, -3, 5, 3] },
            { name: "영상의학과 (일반 판독)", coords: [-5, 0, -5, 4] },
            { name: "영상의학과 (인터벤션 전문)", coords: [5, 4, -3, -3] },
            { name: "마취통증의학과 (수술실 마취)", coords: [3, 4, -5, 0] },
            { name: "마취통증의학과 (통증 클리닉)", coords: [4, -4, 2, 3] },
            { name: "진단검사의학과 / 병리과", coords: [-5, -5, -5, 5] },
            { name: "응급의학과", coords: [3, 5, -2, -2] }
        ];

        // --- [상태 변수] ---
        let scores = { x: 0, y: 0, z: 0, w: 0 };
        let roAnswers = [false, false, false, false, false]; // Q21~25 결과
        let currentQuestion = 0;
        const totalQuestions = mainQuestions.length + roQuestions.length;

        // --- [로직 함수] ---

        function startGame() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-question').classList.remove('hidden');
            document.getElementById('screen-question').classList.add('flex');
            scores = { x: 0, y: 0, z: 0, w: 0 };
            roAnswers = [false, false, false, false, false];
            currentQuestion = 0;
            renderQuestion();
        }

        function renderQuestion() {
            const isMain = currentQuestion < mainQuestions.length;
            const progress = ((currentQuestion) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            const qNumEl = document.getElementById('question-number');
            const qTextEl = document.getElementById('question-text');
            const optsContainer = document.getElementById('options-container');
            
            // 페이드 인 애니메이션
            qTextEl.classList.remove('fade-in');
            optsContainer.classList.remove('fade-in');
            void qTextEl.offsetWidth; // 트리거 리플로우
            qTextEl.classList.add('fade-in');
            optsContainer.classList.add('fade-in');

            qNumEl.innerText = `Q${currentQuestion + 1}.`;

            if (isMain) {
                const qData = mainQuestions[currentQuestion];
                qTextEl.innerText = qData.q;
                optsContainer.innerHTML = qData.opts.map((opt, idx) => `
                    <button onclick='handleMainAnswer(${JSON.stringify(opt.score)})' class="option-btn w-full text-left bg-white border-2 border-slate-200 p-5 rounded-2xl hover:border-blue-400 hover:bg-blue-50 text-slate-700 leading-relaxed break-keep shadow-sm">
                        ${opt.text}
                    </button>
                `).join('');
            } else {
                const roIndex = currentQuestion - mainQuestions.length;
                const qData = roQuestions[roIndex];
                qTextEl.innerText = qData.q;
                optsContainer.innerHTML = `
                    <button onclick="handleRoAnswer(true)" class="option-btn w-full text-center bg-white border-2 border-slate-200 p-5 rounded-2xl hover:border-blue-400 hover:bg-blue-50 text-slate-700 font-bold shadow-sm">
                        맞다
                    </button>
                    <button onclick="handleRoAnswer(false)" class="option-btn w-full text-center bg-white border-2 border-slate-200 p-5 rounded-2xl hover:border-blue-400 hover:bg-blue-50 text-slate-700 font-bold shadow-sm">
                        아니다
                    </button>
                `;
            }
        }

        function handleMainAnswer(scoreObj) {
            if(scoreObj.x) scores.x += scoreObj.x;
            if(scoreObj.y) scores.y += scoreObj.y;
            if(scoreObj.z) scores.z += scoreObj.z;
            if(scoreObj.w) scores.w += scoreObj.w;
            nextQuestion();
        }

        function handleRoAnswer(isYes) {
            const roIndex = currentQuestion - mainQuestions.length;
            roAnswers[roIndex] = isYes;
            nextQuestion();
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= totalQuestions) {
                showLoading();
            } else {
                renderQuestion();
            }
        }

        function showLoading() {
            document.getElementById('screen-question').classList.add('hidden');
            document.getElementById('screen-question').classList.remove('flex');
            document.getElementById('screen-loading').classList.remove('hidden');
            document.getElementById('screen-loading').classList.add('flex');
            
            setTimeout(() => {
                calculateResult();
            }, 1500); // 1.5초 로딩 효과
        }

        function calculateResult() {
            // 1. 유저 좌표 도출 (총합 / 9)
            const ux = scores.x / 9;
            const uy = scores.y / 9;
            const uz = scores.z / 9;
            const uw = scores.w / 9;

            // 2. 캐릭터 부호 판별 (0은 +로 처리)
            const signX = ux >= 0 ? '+' : '-';
            const signY = uy >= 0 ? '+' : '-';
            const signZ = uz >= 0 ? '+' : '-';
            const signW = uw >= 0 ? '+' : '-';
            const charKey = `${signX}${signY}${signZ}${signW}`;
            
            // 3. 직군 판별 (Y가 +이고 W가 - -> 교수님 / Y가 -이고 Z가 + -> 원장님 / 그 외 -> 과장님)
            let jobTitle = "과장님(봉직의)";
            if (uy >= 0 && uw < 0) {
                jobTitle = "교수님";
            } else if (uy < 0 && uz >= 0) {
                jobTitle = "원장님"; // 프롬프트 예시대로 간결하게 표현
            }

            // 4. 전공 추천 (거리 계산 및 필터링)
            let candidates = specialties.filter(sp => {
                const [sx, sy, sz, sw] = sp.coords;
                // 하드 필터링 적용 (맞다 선택 시 제외)
                if (roAnswers[0] && sx >= 3) return false;
                if (roAnswers[1] && sy >= 4) return false;
                if (roAnswers[2] && sz >= 4) return false;
                if (roAnswers[3] && sw <= -4) return false;
                if (roAnswers[4] && sz <= -4) return false;
                return true;
            });

            // 거리 계산 및 정렬
            candidates = candidates.map(sp => {
                const [sx, sy, sz, sw] = sp.coords;
                const dist = Math.sqrt(Math.pow(ux - sx, 2) + Math.pow(uy - sy, 2) + Math.pow(uz - sz, 2) + Math.pow(uw - sw, 2));
                return { ...sp, dist };
            }).sort((a, b) => a.dist - b.dist);

            const top3 = candidates.slice(0, 3);

            // 5. 결과 화면 렌더링
            document.getElementById('screen-loading').classList.add('hidden');
            document.getElementById('screen-loading').classList.remove('flex');
            
            const resScreen = document.getElementById('screen-result');
            resScreen.classList.remove('hidden');
            resScreen.classList.add('flex');

            const charData = characters[charKey];
            document.getElementById('result-title').innerText = charData.title;
            document.getElementById('result-desc').innerHTML = charData.desc.replace(/\n/g, '<br>');

            const recHtml = top3.map((sp, idx) => {
                const colors = ['bg-blue-50 border-blue-200 text-blue-700', 'bg-slate-50 border-slate-200 text-slate-700', 'bg-slate-50 border-slate-200 text-slate-600'];
                const badgeColors = ['bg-blue-500 text-white', 'bg-slate-400 text-white', 'bg-slate-300 text-slate-700'];
                return `
                    <div class="flex items-center p-4 border-2 rounded-2xl ${colors[idx]}">
                        <span class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mr-4 ${badgeColors[idx]}">${idx + 1}</span>
                        <span class="font-bold text-lg">${sp.name} <span class="font-normal opacity-80 text-sm ml-1">${jobTitle}</span></span>
                    </div>
                `;
            }).join('');

            // 필터링되어 남은 과가 부족할 경우 예외 처리
            if(top3.length === 0) {
                 document.getElementById('recommendations').innerHTML = `<div class="p-4 text-center text-slate-500 bg-slate-50 rounded-xl">조건에 맞는 전공이 없습니다.</div>`;
            } else {
                 document.getElementById('recommendations').innerHTML = recHtml;
            }
        }

        function restartGame() {
            document.getElementById('screen-result').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('flex');
            document.getElementById('screen-start').classList.remove('hidden');
        }

    </script>
</body>
